<!DOCTYPE html> <!--o DocType indica a linguagem de programação que está sendo usado-->
<html lang="pt-br"> <!--início do código-->
<head> <!--início do cabeçalho do documento. Dentro dessa tag pode ser inseridas folhas de estilo e scripts-->
    <meta charset="UTF-8"> <!--indica qual será os caracteres (character set ou charset) será utilizado para renderizar o texto da página.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifólio</title> <!--título do projeto-->
</head> <!--fim do cabeçalho do documento-->
<body> <!--nesse espaço está contido o conteúdo visual da página. As tags que representam texto, botões e outros devem ser adicionadas nesse intervalo.-->
    <!--Um documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fachadas, que as diferenciam é que as tags de fachamento possuem uma \ antes do nome. Algunas códigos não precisam da <\> para fechamento, apenas da barra, como o caso da tag meta. Outro aspecto importante é que ela é case insensitive, ou seja, não leva em consideração a diferença entre letras oficiais e minúsculas.-->
<!-- No HTML há seis níbeis de cabeçalhos\títulos que podem ser usados por meios das tags h1, h2, h3, h4, h5 e h6, sendo o h1 o maior e mais relevante e o h6 o menor/menos relevante.-->
 <h1> Portfólio </h1>
 <h2> Programação</h2>
 <h3> HTML</h3>
 <h4> CSS</h4>
 <h5>Js</h5>
 <h6> Matemática </h6>
 <!--Parágrafos de texto são gerados em HTML por meio das tags <p> </P>. Esse é um exemplo de tag cuja disposição na tela se dá em forma de-->
</body> <!--fechamento da tag.-->
</html> <!--fim do código-->
